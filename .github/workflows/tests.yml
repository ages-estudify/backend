name: Backend Tests

on:
  push:
  pull_request:

jobs:

  setup:
    name: Setup & Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate


  format:
    name: Code Format
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format code
        run: npm run format

      - name: Fail if formatting changed files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Code is not properly formatted."
            echo "👉 Run 'npm run format' locally and commit the changes."
            git status
            exit 1
          fi


  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npm run lint


  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate test structure
        run: npm run test:structure

      - name: Run unit tests with coverage
        run: npm run test:ci

      - name: Print coverage summary
        run: npm run test:coverage:summary

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 14


  changed-files-require-tests:
    name: Changed Files Require Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate changed files have tests
        env:
          BASE_REF: origin/${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: npm run test:changed


  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Wait for database
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up!" && break
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Apply database migrations
        run: npx prisma migrate deploy

      # opcional se precisar de dados iniciais
      # - name: Seed database
      #   run: npx prisma db seed

      - name: Run e2e tests
        run: npm run test:e2e


  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build project
        run: npm run build